services:
  kafka:
    image: apache/kafka:3.8.0
    container_name: gnss-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_NUM_PARTITIONS: 3
    volumes:
      - ./docker-data/kafka:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s

  consumer:
    build:
      context: .
    container_name: gnss-consumer
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    command: ["python", "consumer/spark_consumer.py", "--config", "config/settings.docker.yaml"]
    environment:
      SPARK_LOCAL_IP: 127.0.0.1
    volumes:
      - ./:/app
      - ./docker-data/ivy:/root/.ivy2
      - ./docker-data/checkpoints:/app/checkpoints

  producer:
    build:
      context: .
    container_name: gnss-producer
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    command:
      [
        "python",
        "producer/kafka_producer.py",
        "--config",
        "config/settings.docker.yaml",
        "--source",
        "${GNSS_SOURCE:-ntrip}",
        "--delay",
        "${GNSS_DELAY:-2}"
      ]
    volumes:
      - ./:/app

  dashboard:
    build:
      context: .
    container_name: gnss-dashboard
    depends_on:
      kafka:
        condition: service_healthy
    working_dir: /app
    command: ["streamlit", "run", "dashboard/app.py", "--server.address=0.0.0.0", "--server.port=8501"]
    environment:
      APP_CONFIG: config/settings.docker.yaml
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_PROCESSED_TOPIC: processed_gnss
      DASHBOARD_USE_SAMPLE_DATA: "false"
    ports:
      - "8501:8501"
    volumes:
      - ./:/app
